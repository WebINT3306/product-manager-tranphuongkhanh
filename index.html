<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    table {
      width: 80%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background-color: #f2f2f2;
    }
    tbody tr:hover {
      background-color: #f1f1f1;
    }
    tbody tr:nth-child(even) {
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
    <h2>Thêm Sản Phẩm</h2>
    <div>
        <div class="form-group">
            <label>Tên:</label>
            <input type="text" id="input-name">
        </div>
        <div class="form-group">
            <label>Danh mục:</label>
            <input type="text" id="input-category">
        </div>
        <div class="form-group">
            <label>Đơn giá:</label>
            <input type="number" id="input-price">
        </div>
        <div class="form-group">
            <label>Số lượng:</label>
            <input type="number" id="input-quantity">
        </div>
        <button id="btn-add">Thêm mới</button>
    </div>

    <h2>Danh Sách Sản Phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="sort-name">Tên sản phẩm </th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

  <script>
    var products = [];
    var isAsc = false;

    function renderTable() {
        var tbody = document.querySelector('#product-table tbody');
        if (!tbody) return;
        tbody.innerHTML = '';
        
        for (var i = 0; i < products.length; i++) {
            var p = products[i];
            var tr = document.createElement('tr');
   
            tr.innerHTML = 
                '<td>' + (i + 1) + '</td>' +
                '<td>' + p.name + '</td>' +
                '<td>' + p.category + '</td>' +
                '<td>' + p.price + '</td>' +
                '<td>' + p.quantity + '</td>';
            
            tbody.appendChild(tr);
        }
    }

    function loadData() {
        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                products = JSON.parse(xhr.responseText);
                renderTable();
            }
        };
        xhr.open('GET', 'products.json');
        xhr.send();
    }

    document.getElementById('sort-name').addEventListener('click', function() {
        isAsc = !isAsc;
        products.sort(function(a, b) {
            if (a.name < b.name) return isAsc ? -1 : 1;
            if (a.name > b.name) return isAsc ? 1 : -1;
            return 0;
        });
        renderTable();
    });

    document.getElementById('btn-add').addEventListener('click', function() {
        var name = document.getElementById('input-name').value;
        var category = document.getElementById('input-category').value;
        var price = document.getElementById('input-price').value;
        var quantity = document.getElementById('input-quantity').value;

        if (!name) return;

        products.push({
            id: Date.now(),
            name: name,
            category: category,
            price: Number(price),
            quantity: Number(quantity)
        });

        renderTable();

        document.getElementById('input-name').value = '';
        document.getElementById('input-category').value = '';
        document.getElementById('input-price').value = '';
        document.getElementById('input-quantity').value = '';
    });

    loadData();
  </script>
</body>
</html>
